specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Echo Global Logistics
providerId: echo-global-logistics
created: '2026-05-23'
modified: '2026-05-23'
reconciled: false
tags:
  - Logistics
  - Freight
  - Third Party Logistics
  - API
  - FinOps
  - Cost Management
  - FOCUS
description: >-
  FOCUS-aligned FinOps placeholder for Echo Global Logistics. Echo's spend
  surface is the underlying transportation service (per-shipment freight,
  managed-transportation fees, value-add services like EchoInsure+), not API
  consumption. There is no public usage-priced API meter to ingest; allocation
  is invoice-driven.
notes: >-
  Initial scaffold — Echo's billing model is contract / invoice based and
  has not been reconciled against a published usage feed.
sources:
  - https://www.echo.com/
  - https://www.echo.com/technology/integrations/echosync/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Echo Global Logistics
serviceCategory: Logistics
billingModel:
  pricingCategory: Contracted
  billingFrequency: Per Shipment / Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Echo Global Logistics
  ServiceCategory: Logistics
  ProviderName: Echo Global Logistics
  PublisherName: Echo Global Logistics
  InvoiceIssuerName: Echo Global Logistics
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: shipments
    description: Billed freight movements (truckload, LTL, partial, intermodal, parcel, etc.).
    unit: shipment
    aggregation: sum
    dimensions:
      - account
      - mode
      - lane
  - name: managed_transportation_fee
    description: Managed-transportation engagement fees (typically monthly or per shipment).
    unit: fee
    aggregation: sum
    dimensions:
      - account
      - period
principles:
  - name: Visibility
    description: Pull invoices and the shipment ledger from EchoShip / TMS exports; there is no documented self-serve cost API.
  - name: Allocation
    description: Tag invoice line items by business unit, lane, and mode in your FinOps store.
  - name: Optimization
    description: Renegotiate annually based on lane mix, mode shift opportunities (LTL consolidation, intermodal substitution), and managed-transportation scope.
  - name: Accountability
    description: Assign a freight contract owner to reconcile invoices against negotiated rates and accessorial schedules.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
